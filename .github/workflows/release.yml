name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Download bundled resources
        shell: pwsh
        working-directory: src-tauri
        run: |
          if (Test-Path ./download-bundles.ps1) {
            pwsh -File ./download-bundles.ps1
          }

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tag: ${{ github.ref_name }}
          releaseName: "快泛claw ${{ github.ref_name }}"
          args: --bundles nsis

      - name: Generate checksums
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          "$hash  $($exe.Name)" | Out-File -FilePath "${{ github.workspace }}/checksums.txt" -Encoding UTF8
          Write-Output "CHECKSUM=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create update JSON
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          $version = "${{ github.ref_name }}".TrimStart('v')
          $json = @{
            version = $version
            notes = "快泛claw v$version 发布"
            platforms = @{
              "windows-x86_64" = @{
                signature = ""
                url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($exe.Name)"
              }
            }
          } | ConvertTo-Json -Depth 3
          $json | Out-File -FilePath "update-$version.json" -Encoding UTF8

      - name: Upload update JSON
        uses: softprops/action-gh-release@v2
        with:
          files: update-*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
