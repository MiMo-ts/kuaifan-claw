name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Update version in tauri.conf.json
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $configPath = "${{ github.workspace }}/src-tauri/tauri.conf.json"
          $content = Get-Content $configPath -Raw
          $content = $content -replace '"version":\s*"[^"]+"', """version"": ""$version"""
          Set-Content -Path $configPath -Value $content -Encoding UTF8 -NoNewline
          Write-Output "Updated version to $version"
          Get-Content $configPath | Select-String "version"

      - name: Commit tauri.conf.json version update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "src-tauri/tauri.conf.json"
          git commit -m "chore: bump version to ${{ github.ref_name }}"

      - name: Copy bundled files to root
        shell: pwsh
        working-directory: src-tauri
        run: |
          Copy-Item -Path "bundled-env/node-v22.14.0-win-x64.zip" -Destination "." -Force
          Copy-Item -Path "bundled-env/MinGit-2.53.0-64-bit.zip" -Destination "." -Force
          Copy-Item -Path "bundled-openclaw/openclaw-cn.zip" -Destination "." -Force -ErrorAction SilentlyContinue
          if (Test-Path "bundled-openclaw/openclaw-cn.tgz") {
            Copy-Item -Path "bundled-openclaw/openclaw-cn.tgz" -Destination "." -Force
          }

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tag: ${{ github.ref_name }}
          releaseName: "快泛claw ${{ github.ref_name }}"
          args: --bundles nsis

      - name: Find exe file
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          Write-Output "EXE_PATH=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding UTF8
          Write-Output "EXE_NAME=$($exe.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding UTF8 -Append
          Write-Output "Found exe: $($exe.FullName)"

      - name: Upload exe and signature to release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.ref_name }}
          name: "快泛claw ${{ github.ref_name }}"
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          "$hash  $($exe.Name)" | Out-File -FilePath "${{ github.workspace }}/checksums.txt" -Encoding UTF8

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.ref_name }}
          files: checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create update JSON
        shell: pwsh
        run: |
          # 从 release assets 获取实际的文件名
          $version = "${{ github.ref_name }}".TrimStart('v')
          $apiUrl = "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          $headers = @{ "Authorization" = "token ${{ secrets.GITHUB_TOKEN }}" }
          $release = Invoke-RestMethod -Uri $apiUrl -Headers $headers
          $exeAsset = $release.assets | Where-Object { $_.name -match "x64-setup\.exe$" } | Select-Object -First 1
          $exeName = $exeAsset.name
          $sigFile = "src-tauri/target/release/bundle/nsis/$exeName.sig"
          $signature = if (Test-Path $sigFile) { Get-Content $sigFile -Raw } else { "" }
          $json = @{
            version = $version
            notes = "快泛claw v$version 发布"
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$exeName"
              }
            }
          } | ConvertTo-Json -Depth 3
          $json | Out-File -FilePath "update-$version.json" -Encoding UTF8

      - name: Upload update JSON
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.ref_name }}
          files: update-*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy latest.json to GitHub Pages
        run: |
          mkdir -Force $env:GITHUB_WORKSPACE/pages
          $version = "${{ github.ref_name }}".TrimStart('v')
          $apiUrl = "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          $headers = @{ "Authorization" = "token ${{ secrets.GITHUB_TOKEN }}" }
          $release = Invoke-RestMethod -Uri $apiUrl -Headers $headers
          $exeAsset = $release.assets | Where-Object { $_.name -match "x64-setup\.exe$" } | Select-Object -First 1
          $exeName = $exeAsset.name
          $sigFile = "src-tauri/target/release/bundle/nsis/$exeName.sig"
          $signature = if (Test-Path $sigFile) { Get-Content $sigFile -Raw } else { "" }
          $json = @{
            version = $version
            notes = "快泛claw v$version 发布"
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$exeName"
              }
            }
          } | ConvertTo-Json -Depth 3
          $json | Out-File -FilePath "$env:GITHUB_WORKSPACE/pages/latest.json" -Encoding UTF8
          # Also create update-latest.json in workspace for main branch commit
          $json | Out-File -FilePath "$env:GITHUB_WORKSPACE/update-latest.json" -Encoding UTF8

      - name: Upload to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages
          publish_branch: gh-pages

      - name: Commit update-latest.json to main branch
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $apiUrl = "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          $headers = @{ "Authorization" = "token ${{ secrets.GITHUB_TOKEN }}" }
          $release = Invoke-RestMethod -Uri $apiUrl -Headers $headers
          $exeAsset = $release.assets | Where-Object { $_.name -match "x64-setup\.exe$" } | Select-Object -First 1
          $exeName = $exeAsset.name
          $json = @{
            version = $version
            notes = "快泛claw v$version 发布"
            platforms = @{
              "windows-x86_64" = @{
                signature = ""
                url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$exeName"
              }
            }
          } | ConvertTo-Json -Depth 3
          # Write directly to update-latest.json in the repo root
          $json | Out-File -FilePath "update-latest.json" -Encoding UTF8 -NoNewline
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "./update-latest.json"
          git commit -m "chore: update latest.json for ${{ github.ref_name }}"
          # Force push to main branch (use HEAD:main since we're in detached HEAD state)
          git push --force origin HEAD:main
