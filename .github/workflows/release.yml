name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Copy bundled files to root
        shell: pwsh
        working-directory: src-tauri
        run: |
          Copy-Item -Path "bundled-env/node-v22.14.0-win-x64.zip" -Destination "." -Force
          Copy-Item -Path "bundled-env/MinGit-2.53.0-64-bit.zip" -Destination "." -Force
          Copy-Item -Path "bundled-openclaw/openclaw-cn.zip" -Destination "." -Force -ErrorAction SilentlyContinue
          if (Test-Path "bundled-openclaw/openclaw-cn.tgz") {
            Copy-Item -Path "bundled-openclaw/openclaw-cn.tgz" -Destination "." -Force
          }

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tag: ${{ github.ref_name }}
          releaseName: "快泛claw ${{ github.ref_name }}"
          args: --bundles nsis

      - name: Find exe file
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          Write-Output "EXE_PATH=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding UTF8
          Write-Output "EXE_NAME=$($exe.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding UTF8 -Append
          Write-Output "Found exe: $($exe.FullName)"

      - name: Upload exe and signature to release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.ref_name }}
          name: "快泛claw ${{ github.ref_name }}"
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          "$hash  $($exe.Name)" | Out-File -FilePath "${{ github.workspace }}/checksums.txt" -Encoding UTF8

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.ref_name }}
          files: checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create update JSON
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          $sigFile = [System.IO.Path]::ChangeExtension($exe.FullName, ".sig")
          $signature = if (Test-Path $sigFile) { Get-Content $sigFile -Raw } else { "" }
          $version = "${{ github.ref_name }}".TrimStart('v')
          $json = @{
            version = $version
            notes = "快泛claw v$version 发布"
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($exe.Name)"
              }
            }
          } | ConvertTo-Json -Depth 3
          $json | Out-File -FilePath "update-$version.json" -Encoding UTF8

      - name: Upload update JSON
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.ref_name }}
          files: update-*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy latest.json to GitHub Pages
        run: |
          mkdir -Force $env:GITHUB_WORKSPACE/pages
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          $sigFile = [System.IO.Path]::ChangeExtension($exe.FullName, ".sig")
          $signature = if (Test-Path $sigFile) { Get-Content $sigFile -Raw } else { "" }
          $version = "${{ github.ref_name }}".TrimStart('v')
          $json = @{
            version = $version
            notes = "快泛claw v$version 发布"
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($exe.Name)"
              }
            }
          } | ConvertTo-Json -Depth 3
          $json | Out-File -FilePath "$env:GITHUB_WORKSPACE/pages/latest.json" -Encoding UTF8

      - name: Upload to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages
          publish_branch: gh-pages
