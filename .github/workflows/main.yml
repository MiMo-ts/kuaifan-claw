name: Build App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SKIP_BUNDLED_CHECK: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Show directory structure
        run: ls -la
      - name: Copy src-tauri
        run: cp -r src-tauri src-tauri-temp && mv src-tauri-temp src-tauri
      - name: Install deps
        run: npm install
        working-directory: web
      - name: Build frontend
        run: npm run build
        working-directory: web
      - name: Show dist
        run: ls -la web/dist
      - name: Copy dist
        run: |
          mkdir -p src-tauri/dist
          rm -rf src-tauri/dist/*
          cp -r web/dist/* src-tauri/dist/
          ls -la src-tauri/dist
      - name: Build Tauri for Intel
        run: npx @tauri-apps/cli build --target x86_64-apple-darwin
        working-directory: src-tauri
      - uses: actions/upload-artifact@v4
        with:
          name: macos-intel-package
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Show directory structure
        run: ls -la
      - name: Copy src-tauri
        run: cp -r src-tauri src-tauri-temp && mv src-tauri-temp src-tauri
      - name: Install deps
        run: npm install
        working-directory: web
      - name: Build frontend
        run: npm run build
        working-directory: web
      - name: Show dist
        run: ls -la web/dist
      - name: Copy dist
        run: |
          mkdir -p src-tauri/dist
          rm -rf src-tauri/dist/*
          cp -r web/dist/* src-tauri/dist/
          ls -la src-tauri/dist
      - name: Build Tauri for Apple Silicon
        run: npx @tauri-apps/cli build --target aarch64-apple-darwin
        working-directory: src-tauri
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm-package
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install and build frontend
        run: npm install && npm run build
        working-directory: web
      - name: Show dist
        run: ls -la web/dist
      - name: Copy dist to src-tauri
        run: |
          mkdir -p src-tauri/dist
          Remove-Item -Recurse -Force src-tauri/dist/* -ErrorAction SilentlyContinue
          Copy-Item -Recurse web/dist/* src-tauri/dist/
          if (!(Test-Path src-tauri/dist/index.html)) { throw "Copy failed - index.html not found" }
          Write-Host "=== src-tauri/dist contents ==="
          Get-ChildItem src-tauri/dist -Recurse | Format-Table Name, Length
        shell: pwsh
      - name: Build Tauri
        run: npx @tauri-apps/cli build
        working-directory: src-tauri
      - uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: src-tauri/target/release/bundle/nsis/*.exe
