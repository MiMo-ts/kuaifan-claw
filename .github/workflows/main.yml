name: Build for multiple platforms

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SKIP_BUNDLED_CHECK: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Copy src-tauri to web
        run: cp -r src-tauri web/

      - name: Install npm deps
        run: npm install
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Copy dist to src-tauri
        run: cp -r web/dist src-tauri/

      - name: Build Tauri app
        run: cd src-tauri && npm run tauri:build
        working-directory: web
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Copy src-tauri to web
        run: cp -r src-tauri web/

      - name: Install npm deps
        run: npm install
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Copy dist to src-tauri
        run: cp -r web/dist src-tauri/

      - name: Build Tauri app
        run: cd src-tauri && npm run tauri:build
        working-directory: web

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore