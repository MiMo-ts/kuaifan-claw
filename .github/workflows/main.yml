name: Build App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SKIP_BUNDLED_CHECK: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Show directory structure
        run: ls -la
      - name: Copy src-tauri
        run: cp -r src-tauri src-tauri-temp && mv src-tauri-temp src-tauri
      - name: Install deps
        run: npm install
        working-directory: web
      - name: Build frontend
        run: npm run build
        working-directory: web
      - name: Show dist
        run: ls -la web/dist
      - name: Copy dist
        run: mkdir -p src-tauri/dist && cp -r web/dist/* src-tauri/dist/
      - name: Show src-tauri
        run: ls -la src-tauri/dist
      - name: Build Tauri verbose
        run: cd src-tauri && cargo build --release -vv 2>&1 | tail -100
      - name: Build Tauri
        run: npx @tauri-apps/cli build
        working-directory: src-tauri
      - uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install and build frontend
        run: |
          npm install
          npm run build
          if (!(Test-Path web/dist/index.html)) { throw "Frontend build failed - index.html not found" }
        working-directory: web
      - name: Copy dist to src-tauri (with clean)
        run: |
          mkdir -p src-tauri/dist
          Remove-Item -Recurse -Force src-tauri/dist/* -ErrorAction SilentlyContinue
          Copy-Item -Recurse web/dist/* src-tauri/dist/
          if (!(Test-Path src-tauri/dist/index.html)) { throw "Copy failed - index.html not found in src-tauri/dist" }
          Write-Host "=== src-tauri/dist contents ==="
          Get-ChildItem src-tauri/dist -Recurse | Format-Table Name, Length
        shell: pwsh
      - name: Build Tauri
        run: npx @tauri-apps/cli build
        working-directory: src-tauri
      - uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: src-tauri/target/release/bundle/nsis/*.exe
