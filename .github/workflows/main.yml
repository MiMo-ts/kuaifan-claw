name: Build for multiple platforms

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Copy Tauri to web
        run: cp -r src-tauri web/src-tauri

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Build Tauri app
        run: cd web/src-tauri && npm run tauri:build
        shell: bash

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            web/src-tauri/target/release/bundle/nsis/*.exe
            web/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Copy Tauri to web
        run: cp -r src-tauri web/src-tauri

      - name: Download Node.js for macOS arm64
        run: |
          mkdir -p web/src-tauri/bundled-env
          curl -L -o web/src-tauri/bundled-env/node-v22.14.0-darwin-arm64.tar.gz https://nodejs.org/dist/v22.14.0/node-v22.14.0-darwin-arm64.tar.gz
        shell: bash

      - name: Download MinGit for macOS arm64
        run: |
          curl -L -o web/src-tauri/bundled-env/mingit-2.53.0-arm64.tar.gz https://github.com/git-for-windows/git/releases/download/v2.53.0.windows.1/PortableGit-2.53.0-64-bit.tar.gz
        shell: bash

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Build Tauri app
        run: cd web/src-tauri && npm run tauri:build -- --target aarch64-apple-darwin
        shell: bash

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: |
            web/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            web/src-tauri/target/aarch64-apple-darwin/release/bundle/app/*.app
          if-no-files-found: ignore

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Copy Tauri to web
        run: cp -r src-tauri web/src-tauri

      - name: Download Node.js for Linux x64
        run: |
          mkdir -p web/src-tauri/bundled-env
          curl -L -o web/src-tauri/bundled-env/node-v22.14.0-linux-x64.tar.gz https://nodejs.org/dist/v22.14.0/node-v22.14.0-linux-x64.tar.gz
        shell: bash

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Build Tauri app
        run: cd web/src-tauri && npm run tauri:build
        shell: bash

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: |
            web/src-tauri/target/release/bundle/appimage/*.AppImage
            web/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore