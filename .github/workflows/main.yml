name: Build for multiple platforms

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-all:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: ''
            ext: '.exe'
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: '.app'
          - os: ubuntu-24.04
            target: ''
            ext: '.AppImage'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Copy Tauri to web
        run: cp -r src-tauri web/src-tauri

      - name: Download bundles (Windows)
        if: runner.os == 'Windows'
        run: |
          cd web/src-tauri
          pwsh -File ./download-bundles.ps1
        shell: pwsh

      - name: Download bundles (macOS)
        if: runner.os == 'macOS'
        run: |
          cd web/src-tauri
          chmod +x scripts/download-bundles.sh
          ./scripts/download-bundles.sh

      - name: Download bundles (Linux)
        if: runner.os == 'Linux'
        run: |
          cd web/src-tauri
          chmod +x scripts/download-bundles.sh
          ./scripts/download-bundles.sh

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Build Tauri app
        run: |
          if [ "${{ matrix.target }}" != "" ]; then
            cd web/src-tauri
            npm run tauri:build -- --target "${{ matrix.target }}"
          else
            cd web/src-tauri
            npm run tauri:build
          fi
        working-directory: web
        shell: bash

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            web/src-tauri/target/release/bundle/nsis/*.exe
            web/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: |
            web/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            web/src-tauri/target/aarch64-apple-darwin/release/bundle/app/*.app
          if-no-files-found: ignore

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: |
            web/src-tauri/target/release/bundle/appimage/*.AppImage
            web/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore