name: Build for multiple platforms

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    # 手动触发选项

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        run: |
          curl -fsSL https://nodejs.org/dist/v18.20.8/node-v18.20.8-win-x64.zip -o nodejs.zip
          Expand-Archive nodejs.zip -DestinationPath .
          echo "$PWD\node-v18.20.8-win-x64\bin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
        shell: powershell

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build Windows package
        run: npm run tauri:build
        working-directory: web

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: src-tauri/target/release/bundle/msi/*.msi

  build-macos:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        run: |
          curl -fsSL https://nodejs.org/dist/v18.20.8/node-v18.20.8-darwin-x64.tar.gz -o nodejs.tar.gz
          tar -xzf nodejs.tar.gz
          echo "$PWD/node-v18.20.8-darwin-x64/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build macOS package
        run: npm run tauri:build -- --target aarch64-apple-darwin
        working-directory: web

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

  build-linux:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        run: |
          curl -fsSL https://nodejs.org/dist/v18.20.8/node-v18.20.8-linux-x64.tar.xz -o nodejs.tar.xz
          tar -xJf nodejs.tar.xz
          echo "$PWD/node-v18.20.8-linux-x64/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build Linux package
        run: npm run tauri:build
        working-directory: web

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: src-tauri/target/release/bundle/deb/*.deb
