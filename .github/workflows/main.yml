name: Build for multiple platforms

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SKIP_BUNDLED_CHECK: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Copy Tauri to web
        run: cp -r src-tauri web/src-tauri

      - name: Fix frontendDist path
        run: |
          sed -i 's|"frontendDist": "../dist"|"frontendDist": "./dist"|g' web/src-tauri/tauri.conf.json
        shell: bash

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Build Tauri app
        run: cd web/src-tauri && npx tauri build
        shell: bash

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: web/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Copy Tauri to web
        run: cp -r src-tauri web/src-tauri

      - name: Fix frontendDist path
        run: |
          sed -i 's|"frontendDist": "../dist"|"frontendDist": "./dist"|g' web/src-tauri/tauri.conf.json
        shell: bash

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Build Tauri app (macOS)
        run: |
          cd web/src-tauri
          npx @tauri-apps/cli build --target aarch64-apple-darwin
        shell: bash

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: web/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: ignore