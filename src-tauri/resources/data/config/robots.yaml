# ============================================================
# 机器人配置库（仅作文档/人工参考；管理端运行时以 Rust 源码为准）
#
# 实际生效：`src-tauri/src/commands/robot.rs` 中 `builtin_robot_templates()`。
# 本文件未被 Rust 读取；若与代码不一致，以代码为准。
#
# 设计原则：
#   1. 所有模板 skill/MCP 均免费，无需付费 API Key
#   2. 机器人名称、职能描述与 default_skills 完全对齐
#   3. skill 下载目标仓库：LeoYeAI/openclaw-master-skills
#
# 免费 skill 速查：
#   copywriter       → copywriting（纯 LLM 提示词，无需代码）
#   doc_writer       → writing-plans（纯 LLM 提示词）
#   video_script     → citedy-video-shorts（纯 LLM 提示词）
#   ppt_generator    → writing-plans（纯 LLM 提示词）
#   meeting_minutes   → writing-plans（纯 LLM 提示词）
#   excel_analyzer   → excel-xlsx（SKILL.md，需 Python 环境）
#   data_analysis    → data-analysis（SKILL.md，需 Python 环境）
#   document_parser  → document-parser（SKILL.md，需 Python 环境）
#   comic/novel/story → writing-skills（纯 LLM 提示词）
#   product_selector → product-marketing-context（SKILL.md，LLM 免费）
#   feishu_doc       → feishu-doc（有 index.js，需飞书 appId/secret）
#   internal_comms   → internal-comms（SKILL.md，LLM 免费）
#   git_commit       → git-commit（SKILL.md，免费）
#
# MCP 免费即用：browser / filesystem / fetch / sqlite（无需配置）
#
# 已移除（不可用 / 需付费 Key）：
#   douyin_script → citedy-video-shorts（实际下载的是 tiktok-viral-predictor，
#     内含硬编码假数据，README 写明 ¥39/月，属于付费服务）
#   xiaohongshu_copy → xiaohongshu-mcp（只有 SKILL.md，无 index.js，
#     需要用户手动下载 GitHub binary 并启动 MCP server，门槛极高）
#   xiaohongshu_seo / xiaohongshu_hashtag → 只有 SKILL.md，无 index.js
#   email_writer / calendar → 需 SMTP/IMAP 或 OAuth Key
#   tushare / stock_news / quant_algo → 需付费行情 API Key
#   taobao_api → 需淘宝开放平台 API Key
# ============================================================

